name: Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [feat/windows]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  DATABASE_URL: sqlite:deploykeys.db

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install SQLite
        run: choco install sqlite --no-progress -y

      - name: Create compile-time check database
        shell: bash
        run: |
          rm -f deploykeys.db
          for m in migrations/*.sql; do sqlite3 deploykeys.db < "$m"; done

      - name: Install Rust build tools
        shell: bash
        run: |
          cargo install trunk --locked
          cargo install tauri-cli --version "^2" --locked

      - name: Install Tailwind CLI
        shell: bash
        run: tools/install-tailwind.sh

      - name: Build Windows installer
        run: cargo tauri build --bundles nsis,msi

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploykeys-desktop-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Publish installers to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
